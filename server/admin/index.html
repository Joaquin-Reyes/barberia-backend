<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - Turnos</title>
</head>
<body>
  <h1>📅 Panel de Turnos</h1>

  <button onclick="logout()">🚪 Cerrar sesión</button>

  <h2>➕ Crear turno</h2>

  <input placeholder="Nombre" id="nombre" />
  <input placeholder="Teléfono" id="telefono" />
  
  <select id="servicio">
    <option>Corte</option>
    <option>Barba</option>
    <option>Corte + barba</option>
  </select>

  <select id="barbero">
    <option>Agus</option>
    <option>Lucas</option>
  </select>

  <input type="date" id="fechaCrear" />
  <input placeholder="Hora (ej: 10:00)" id="horaCrear" />

  <button onclick="crearTurno()">Crear</button>

  <hr>

  <h2>🔍 Buscar turnos</h2>

  <input type="date" id="fecha" />
  <button onclick="cargarTurnos()">Buscar</button>

  <table border="1" id="tabla">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Servicio</th>
        <th>Barbero</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function crearTurno() {
      const turno = {
        nombre: document.getElementById("nombre").value,
        telefono: document.getElementById("telefono").value,
        servicio: document.getElementById("servicio").value,
        barbero: document.getElementById("barbero").value,
        fecha: document.getElementById("fechaCrear").value,
        hora: document.getElementById("horaCrear").value
      };

      const res = await fetch("/admin/crear-turno", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(turno)
      });

      if (res.ok) {
        alert("✅ Turno creado");
        cargarTurnos();
      } else {
        alert("❌ Error al crear turno");
      }
    }

    async function cargarTurnos() {
      const fecha = document.getElementById("fecha").value;

      const res = await fetch(`/admin/turnos?fecha=${fecha}`);
      const data = await res.json();

      const tbody = document.querySelector("#tabla tbody");
      tbody.innerHTML = "";

      data.forEach(turno => {
        const fila = `
          <tr>
            <td>${turno.nombre}</td>
            <td>${turno.telefono}</td>
            <td>${turno.servicio}</td>
            <td>${turno.barbero}</td>
            <td>${turno.fecha}</td>
            <td>${turno.hora}</td>
            <td>
              <button onclick="eliminar('${turno.id}')">❌</button>
            </td>
          </tr>
        `;
        tbody.innerHTML += fila;
      });
    }

    async function eliminar(id) {
      if (!confirm("¿Eliminar turno?")) return;

      await fetch(`/admin/turnos/${id}`, {
        method: "DELETE"
      });

      cargarTurnos();
    }

    async function logout() {
  await fetch("/logout", { method: "POST" });
  window.location.href = "/admin";
}

  </script>
</body>
</html>
